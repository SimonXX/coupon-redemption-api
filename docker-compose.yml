services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coupon-redemption-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${API_PORT:?API_PORT is required}:3000"
    networks:
      - coupon-redemption

  postgres:
    image: postgres:16-alpine
    container_name: coupon-redemption-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/002_seed_test_data.sql:/docker-entrypoint-initdb.d/002_seed_test_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coupon-redemption

  adminer:
    image: adminer:4
    container_name: coupon-redemption-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:?ADMINER_PORT is required}:8080"
    networks:
      - coupon-redemption

volumes:
  postgres-data:

networks:
  coupon-redemption:
    driver: bridge
