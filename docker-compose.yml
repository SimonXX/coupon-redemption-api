services:
  migrate:
    image: coupon-redemption-api:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coupon-redemption-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
    command: ["npm", "run", "migrate:prod"]
    networks:
      - coupon-redemption

  seed:
    image: coupon-redemption-api:local
    container_name: coupon-redemption-seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
    command: ["npm", "run", "seed:prod"]
    networks:
      - coupon-redemption

  api:
    image: coupon-redemption-api:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coupon-redemption-api
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      CORS_ORIGIN: http://localhost:${SWAGGER_UI_PORT:?SWAGGER_UI_PORT is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${API_PORT:?API_PORT is required}:3000"
    networks:
      - coupon-redemption

  postgres:
    image: postgres:16-alpine
    container_name: coupon-redemption-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coupon-redemption

  adminer:
    image: adminer:4
    container_name: coupon-redemption-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:?ADMINER_PORT is required}:8080"
    networks:
      - coupon-redemption

  swagger-ui:
    image: docker.swagger.io/swaggerapi/swagger-ui
    container_name: coupon-redemption-swagger-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    ports:
      - "${SWAGGER_UI_PORT:?SWAGGER_UI_PORT is required}:8080"
    volumes:
      - ./docs/openapi.yaml:/openapi/openapi.yaml:ro
    networks:
      - coupon-redemption

volumes:
  postgres-data:

networks:
  coupon-redemption:
    driver: bridge
